# Nothing OS Typeface Integration
font_family      NType82Mono Regular
bold_font        auto
italic_font      auto
bold_italic_font auto

# Rendering
force_ltr yes
font_size 11.0
disable_ligatures never

# Fallback (JetBrains Mono for Nerd Font icons)
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFF JetBrainsMono Nerd Font
