## Monochrome Theme for Kitty

# The basic colors
foreground              #e5e5e5
background              #111111
selection_foreground    #111111
selection_background    #eeeeee

# Cursor colors
cursor                  #eeeeee
cursor_text_color       #111111

# URL underline color when hovering with mouse
url_color               #ffffff

# Kitty window border colors
active_border_color     #ffffff
inactive_border_color   #333333
bell_border_color       #999999

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #111111
active_tab_background   #ffffff
inactive_tab_foreground #cccccc
inactive_tab_background #222222
tab_bar_background      #000000

# Colors for marks (marked text in the terminal)
mark1_foreground #111111
mark1_background #ffffff
mark2_foreground #111111
mark2_background #cccccc
mark3_foreground #111111
mark3_background #999999

# The 16 terminal colors

# black
color0 #111111
color8 #333333

# red
color1 #666666
color9 #666666

# green
color2  #999999
color10 #999999

# yellow
color3  #aaaaaa
color11 #aaaaaa

# blue
color4  #bbbbbb
color12 #bbbbbb

# magenta
color5  #cccccc
color13 #cccccc

# cyan
color6  #dddddd
color14 #dddddd

# white
color7  #eeeeee
color15 #ffffff
