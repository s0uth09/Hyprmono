# windowrules.conf — per-window rules
# Native translation of hyprland/windowsrule.lua.
# hl.window_rule({match={...}, ...props}) -> windowrule = prop1 val1, prop2 val2, match1:val1, match2:val2

# no-gaps-wtv1
windowrule = bordersize 3, rounding 0, floating:1, workspace:w[tv1]

# no-gaps-f1
windowrule = bordersize 3, rounding 0, floating:1, workspace:f[1]

# suppress-maximize-events
windowrule = suppressevent maximize, class:.*

# fix-xwayland-drags
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# move-hyprland-run
windowrule = move 20 monitor_h-120, float, class:hyprland-run
