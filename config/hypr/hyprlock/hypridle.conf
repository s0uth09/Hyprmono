# Primary lock command: tries quickshell lock, falls back to hyprlock
$lock_cmd = pidof hyprlock || hyprlock
# Uncomment below if using quickshell:
# $lock_cmd = hyprctl dispatch global "quickshell:lock" || hyprlock
$suspend_cmd = systemctl suspend || loginctl suspend

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = loginctl lock-session
    # after_sleep_cmd left blank; uncomment below if using quickshell:
    # after_sleep_cmd = hyprctl dispatch global "quickshell:lockFocus"
    inhibit_sleep = 3
}

listener {
    timeout = 300 # 5mins
    on-timeout = loginctl lock-session
}

listener {
    timeout = 600 # 10mins
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 900 # 15mins
    on-timeout = $suspend_cmd
}