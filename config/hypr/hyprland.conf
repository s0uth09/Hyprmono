# hyprland.conf — main entry point
#
# Native re-implementation of hyprland.lua. The original used the hyprlua
# plugin (require()) to load Lua modules that called a plugin-provided
# `hl.*` API. This version uses native Hyprland config syntax and the
# built-in `source =` keyword instead, so it works without the hyprlua
# plugin installed.
#
# Load order mirrors the original require() order in hyprland.lua.

source = ~/.config/hypr/conf.d/colours.conf
source = ~/.config/hypr/conf.d/general.conf
source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/conf.d/variables.conf
source = ~/.config/hypr/conf.d/permission.conf
source = ~/.config/hypr/conf.d/windowrules.conf
source = ~/.config/hypr/conf.d/binds.conf
source = ~/.config/hypr/conf.d/autostart.conf

# Personal overrides, loaded last so they take precedence.
source = ~/.config/hypr/custom/env.conf
source = ~/.config/hypr/custom/execs.conf
source = ~/.config/hypr/custom/general.conf
source = ~/.config/hypr/custom/keybinds.conf
source = ~/.config/hypr/custom/rules.conf
source = ~/.config/hypr/custom/variables.conf
