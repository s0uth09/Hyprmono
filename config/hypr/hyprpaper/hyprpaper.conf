# hyprpaper.conf
# Place your wallpaper in ~/.config/hypr/hyprpaper/ and update the path below.

preload = ~/.config/hypr/hyprpaper/wallpaper.jpg

# Assign to eDP-1 (laptop screen). Add more lines for extra monitors.
wallpaper = eDP-1,~/.config/hypr/hyprpaper/wallpaper.jpg

# Catch-all: any monitor not explicitly listed above.
wallpaper = ,~/.config/hypr/hyprpaper/wallpaper.jpg

ipc = on
